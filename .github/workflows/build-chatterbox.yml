name: Build and Push Chatterbox TTS

on:
  push:
    paths:
      - 'Dockerfile'
      - 'handler.py'
      - 'requirements.txt'
      - '.github/workflows/build-chatterbox.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        timeout-minutes: 55
        with:
          context: .
          push: true
          tags: |
            ghcr.io/pro-scribeteam/chatterbox-tts:latest
            ghcr.io/pro-scribeteam/chatterbox-tts:${{ github.sha }}
          # Cache layers so repeat builds are fast (esp. the heavy pip install + model download)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build args to force model cache into image
          build-args: |
            BUILDKIT_INLINE_CACHE=1
