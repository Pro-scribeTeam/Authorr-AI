name: Build and Push Chatterbox TTS

on:
  push:
    paths:
      - 'Dockerfile'
      - 'handler.py'
      - 'requirements.txt'
      - '.github/workflows/build-chatterbox.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            /usr/lib/jvm /usr/share/swift
          sudo docker image prune -af
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        timeout-minutes: 55
        with:
          context: .
          push: true
          tags: |
            ghcr.io/pro-scribeteam/chatterbox-tts:latest
            ghcr.io/pro-scribeteam/chatterbox-tts:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
